name: Сборка файла геоданных GeoSite
on:
  push:
    branches:
      - master
    paths-ignore:
      - "**/README.md"
      - ".gitignore"
      - "**/dependabot.yml"
      
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: GeoSite
    runs-on: ubuntu-latest
    steps:
      - name: Клонирование кодовой базы из репозитория GitHub
        uses: actions/checkout@v6
        with:
          path: code
          
      - name: Настройка окружения Go
        uses: actions/setup-go@v6
        with:
          go-version-file: code/go.mod
          cache-dependency-path: code/go.sum

      - name: Установка переменных окружения
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +'%y.%m.%d')
      
          LAST=$(gh release list --limit 100 \
            | grep "geoip-${DATE}-r" \
            | sed -E "s/.*geoip-${DATE}-r([0-9]+).*/\1/" \
            | sort -n \
            | tail -1)
      
          REV=$(( ${LAST:-0} + 1 ))
      
          echo "NAME=geosite-${DATE}-r${REV}" >> $GITHUB_ENV

      - name: Сборка файлов geosite
        run: |
          cd code || exit 1
          go run ./ --outputdir=../
          cd ../ && rm -rf code

      - name: Отправка собранных данных в ветку «release» через Git
        run: |
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b release
          git add -A
          git commit -m "${{ env.NAME }}"
          git remote add geosite "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f geosite release
          
      - name: Создание релиза и загрузка файлов
        run: |
          gh release create ${{ env.NAME }} --generate-notes --latest --title ${{ env.NAME }} ./geosite_tbd.dat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}